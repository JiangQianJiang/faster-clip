name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t live-clipper-backend ./backend

      - name: Format check
        run: docker run --rm -e RUFF_NO_CACHE=true live-clipper-backend sh -c "pip install ruff && python -m ruff format --check ."

      - name: Test
        run: >
          docker run --rm
          -e PYTEST_RUNNING=true
          -e RUFF_NO_CACHE=true
          live-clipper-backend
          sh -c "pip install pytest && python -m pytest tests/ -q -p no:cacheprovider"
