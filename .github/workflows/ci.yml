name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker compose build backend

      - name: Install dev deps & lint
        run: docker compose run --rm --no-deps backend sh -c "pip install ruff && ruff format --check ."

      - name: Test
        run: >
          docker compose run --rm --no-deps
          -e PYTEST_RUNNING=true
          -e API_KEY_ENCRYPTION_KEY=Y2ktdGVzdC1mZXJuZXQta2V5LWZha2UtZm9yLXRlc3Rpbmc=
          -e DEFAULT_ASR_PROVIDER=qwen
          backend sh -c "pip install pytest && python -m pytest tests/ -q"
