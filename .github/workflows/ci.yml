name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Format check
        run: ruff format --check .
        working-directory: backend

      - name: Lint check
        run: ruff check .
        working-directory: backend

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t live-clipper-backend ./backend

      - name: Test
        run: >
          docker run --rm
          -e PYTEST_RUNNING=true
          -e RUFF_NO_CACHE=true
          live-clipper-backend
          sh -c "pip install pytest && python -m pytest tests/ -q -p no:cacheprovider"
